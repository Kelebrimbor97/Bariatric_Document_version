version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ehr_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./Data/qdrant_storage:/qdrant/storage
    restart: unless-stopped

  vllm_qwen:
    image: vllm/vllm-openai:latest
    container_name: ehr_vllm_qwen
    ipc: host
    ports:
      - "8000:8000"
    volumes:
      - ${LLM_WEIGHTS_DIR:-./LLM_Weights}:/llm_weights
    gpus: all
    command: >
      --model /llm_weights/Qwen3.6-35B-A3B
      --served-model-name qwen-ehr
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization 0.8
      --tensor-parallel-size 2
      --reasoning-parser qwen3
      --enable-prefix-caching

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0","1"]
              capabilities: [gpu]
    restart: unless-stopped
